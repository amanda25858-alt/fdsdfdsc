<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Video Player</title>
    
    <!-- FontAwesome for Real Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* --- Main Video Container --- */
        .video-container {
            position: relative;
            width: 95%;
            max-width: 450px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }

        /* Background Thumbnail */
        .thumbnail {
            width: 100%;
            display: block;
            opacity: 0.85; /* Slight dark tint to make UI pop */
        }

        /* --- MAGIC TRICK: Face Blur Mask --- */
        /* মুখের ওপরের ব্লার ইফেক্ট। পজিশন ঠিক না থাকলে top এবং left এর % চেঞ্জ করবেন */
        .face-blur {
            position: absolute;
            top: 15%; 
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: rgba(200, 200, 200, 0.05);
            backdrop-filter: blur(20px); /* This blurs only what is behind it */
            -webkit-backdrop-filter: blur(20px);
            z-index: 2;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        /* --- Big Center Play Button --- */
        .play-btn-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: rgba(255, 42, 64, 0.85);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(255, 42, 64, 0.6);
            animation: pulse 2s infinite;
        }

        .play-btn-center i {
            color: #fff;
            font-size: 28px;
            margin-left: 5px; /* Centers the play triangle visually */
        }

        /* --- Bottom Control Bar --- */
        .controls-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 20px 15px 10px 15px;
            z-index: 5;
            display: flex;
            flex-direction: column;
        }

        /* Fake Progress Bar */
        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            margin-bottom: 12px;
            position: relative;
        }

        .progress-bar-fill {
            position: absolute;
            top: 0; left: 0;
            width: 15%; /* Shows a little bit of progress */
            height: 100%;
            background: #ff2a40;
            border-radius: 2px;
        }

        .progress-dot {
            position: absolute;
            top: -4px;
            left: 15%;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* Icons Row */
        .controls-icons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
        }

        .left-icons, .right-icons {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 16px;
        }

        .time-text {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Top Badges */
        .top-badges {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 5;
        }

        .badge-live {
            background: #ff2a40;
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge-hd {
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes pulse { 
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(255, 42, 64, 0.7); } 
            70% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 0 15px rgba(255, 42, 64, 0); } 
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(255, 42, 64, 0); } 
        }

    </style>
</head>
<body>

    <!-- Video Player Container (Clicking anywhere here redirects) -->
    <div class="video-container" onclick="window.location.href='https://bedjfha.hubss.one/p/uyMfR'">
        
        <!-- Top Info -->
        <div class="top-badges">
            <div class="badge-live"><i class="fa-solid fa-circle" style="font-size:8px; margin-right:3px;"></i> RECORDED</div>
            <div class="badge-hd">1080p HD</div>
        </div>

        <!-- The Image -->
        <img src="https://github.com/amanda25858-alt/text8/blob/main/post-img-1782514631688-212437587.webp?raw=true" alt="Video Thumbnail" class="thumbnail">

        <!-- THE MAGIC: Face Blur Element -->
        <div class="face-blur"></div>

        <!-- Big Play Button -->
        <div class="play-btn-center">
            <i class="fa-solid fa-play"></i>
        </div>

        <!-- Bottom Controls -->
        <div class="controls-bar">
            <!-- Progress Bar -->
            <div class="progress-bar-bg">
                <div class="progress-bar-fill"></div>
                <div class="progress-dot"></div>
            </div>
            
            <!-- Play, Time, Volume, Settings, Fullscreen -->
            <div class="controls-icons">
                <div class="left-icons">
                    <i class="fa-solid fa-play"></i>
                    <i class="fa-solid fa-volume-high"></i>
                    <span class="time-text">0:14 / 4:20</span>
                </div>
                <div class="right-icons">
                    <i class="fa-solid fa-closed-captioning"></i>
                    <i class="fa-solid fa-gear"></i>
                    <i class="fa-solid fa-expand"></i>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
