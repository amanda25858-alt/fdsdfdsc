        // Fake Chat Messages to build trust and urgency

            { name: "Me (Host)", text: "Waiting for you babe... hurry up! 💦", type: "host" }

        const chatStream = document.getElementById("chatStream");
        let i = 0;

        function addMessage() {
            if (i < messages.length) {
                let msgDiv = document.createElement("div");
                msgDiv.className = messages[i].type === 'host' ? "chat-msg host" : "chat-msg";
                
                let nameColor = messages[i].type === 'host' ? '#ff2a70' : '#00e676';

                    chatStream.removeChild(chatStream.firstChild);
                }
                
                i++;
                setTimeout(addMessage, Math.random() * 2000 + 1500); // Random delay between 1.5s to 3.5s
