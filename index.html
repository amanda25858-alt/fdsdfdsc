    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #050505;
            --accent-red: #ff2a40;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Blurred Background simulating a live feed */
        .video-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1616091093714-c64882e9ab55?auto=format&fit=crop&w=800&q=80') center/cover no-repeat;
            filter: blur(15px) brightness(0.3);
            z-index: 1;
            transform: scale(1.1);
        }

        /* Verification Modal */
        .verification-box {
            position: relative;
            z-index: 10;
            background: rgba(15, 15, 15, 0.9);
            border: 2px solid rgba(255, 42, 64, 0.2);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 0 30px rgba(255, 42, 64, 0.15);
        }

        .icon-warning {
            font-size: 50px;
            color: var(--accent-red);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        .verification-box h1 {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .verification-box p {
            font-size: 15px;
            color: #cccccc;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-yes {
            background: var(--accent-red);
            color: white;
            padding: 16px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 42, 64, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-yes:active {
            transform: scale(0.98);
        }

        .btn-no {
            background: transparent;
            color: var(--text-muted);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            border: 1px solid #333;
            cursor: pointer;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 11px;
            color: #555;
        }

        @keyframes pulse { 
            0% { transform: scale(1); opacity: 1; } 
            50% { transform: scale(1.1); opacity: 0.8; } 
            100% { transform: scale(1); opacity: 1; } 
        }

    </style>
</head>
<body>

    <!-- Background -->
    <div class="video-bg"></div>

    <!-- Modal -->
    <div class="verification-box">
        <i class="fa-solid fa-triangle-exclamation icon-warning"></i>
        <h1>Age Verification</h1>
        <p>This private live broadcast contains explicit face-to-face video content. You must be 18 years or older to enter this room.</p>
        
        <div class="btn-group">
            <!-- Clicking YES goes to your new smartlink -->
            <div class="btn-yes" onclick="window.location.href='https://sexdate420.netlify.app'">
                YES, I AM 18+ (ENTER)
            </div>
            <!-- Clicking NO redirects elsewhere -->
            <div class="btn-no" onclick="window.location.href='https://www.google.com'">
                NO, I AM UNDER 18
            </div>
        </div>

        <div class="footer-text">
            By entering, you agree to our terms of service and confirm your age.
        </div>
    </div>

</body>
