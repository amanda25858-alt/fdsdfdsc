    <style>
        :root {
            --bg-color: #050505;
            --accent-red: #ff2a40;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        /* Blurred Background simulating a live feed */
        .video-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://github.com/amanda25858-alt/text8/blob/main/HMaXk_HWcAAhsj0.jpg?raw=true') center/cover no-repeat;
            filter: blur(20px) brightness(0.2);
            z-index: 1;
            transform: scale(1.1);
        }

        /* Main Container: Player + Verification */
        .main-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border-radius: 12px;
            animation: slideUp 0.5s ease-out;
        }

        /* --- Fake Video Player Section (Like frre.JPG) --- */
        .fake-player {
            position: relative;
            width: 100%;
            height: 240px;
            background: url('https://github.com/amanda25858-alt/text8/blob/main/HMaXk_HWcAAhsj0.jpg?raw=true') center/cover no-repeat;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            border: 2px solid #222;
            border-bottom: none;
            overflow: hidden;
        }

        /* The Live Badge */
        .live-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(231, 76, 60, 0.85);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #ff4757;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.4);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #fff;
            border-radius: 50%;
            animation: blink 1s infinite alternate;
            box-shadow: 0 0 8px #fff;
        }

        /* Fake Scrollbar on the right */
        .fake-scrollbar {
            position: absolute;
            top: 0; right: 0;
            width: 12px;
            height: 100%;
            background: rgba(0,0,0,0.6);
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        .fake-thumb {
            width: 10px;
            height: 40px;
            background: #555;
            margin: 2px auto;
            border-radius: 5px;
        }

        /* Bottom Player Overlay Text */
        .player-bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 60%, rgba(0,0,0,0) 100%);
            padding: 20px 10px 10px 10px;
            text-align: center;
        }
        .player-bottom-bar h3 { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
        .player-bottom-bar p { font-size: 14px; color: #ddd; }

        /* --- Age Verification Section (Below Player) --- */
        .verification-box {
            background: #111111;
            border: 2px solid #222;
            border-top: 1px solid #333;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            padding: 25px 20px;
            text-align: center;
        }

        .verification-box h2 {
            font-size: 18px;
            color: var(--accent-red);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .verification-box p.warning-text {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn-yes {
            display: block;
            width: 100%;
            background: var(--accent-red);
            color: white;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 42, 64, 0.3);
            transition: 0.2s;
        }
        
        .btn-yes:active { transform: scale(0.98); }

        /* Animations */
        @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0.3; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    </style>
</head>
<!-- Clicking anywhere redirects to the smartlink -->
<body onclick="window.location.href='https://sexdate420.netlify.app'">

    <!-- Main Card -->

        <!-- Fake Video Player Widget -->
        <div class="fake-player">
            <!-- Red Live Badge -->
            <div class="live-badge">
                <div class="live-dot"></div> Live
            </div>
            
            <!-- Fake Scrollbar -->
            <div class="fake-scrollbar">
                <div class="fake-thumb"></div>
            </div>

            <!-- Overlay Text like frre.JPG -->
            <div class="player-bottom-bar">
                <h3>Streaming in Private Room Now</h3>
                <p>Join Free and Watch instantly</p>
            </div>
        </div>

        <!-- Age Verification Form below the player -->
        <div class="verification-box">
            <h2><i class="fa-solid fa-lock"></i> Verification Required</h2>
            <p class="warning-text">This live broadcast contains restricted face-to-face content. Please confirm you are an adult to unlock the video player.</p>
            
            <div class="btn-yes">
                YES, I AM 18+ (PLAY VIDEO)
            </div>
        </div>

    </div>

</body>
