<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat - Private</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { display: flex; height: 100vh; background-color: #121212; color: #fff; overflow: hidden; }
        
        /* Column 1: Left Icons */
        .sidebar-icons { width: 60px; background-color: #18181b; display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-right: 1px solid #27272a; }
        
        /* Column 2: Chat List */
        .sidebar-chats { width: 300px; background-color: #18181b; padding: 20px; border-right: 1px solid #27272a; }
        .sidebar-chats h2 { font-size: 18px; margin-bottom: 20px; }
        
        /* Column 3: Main Chat */
        .chat-area { flex: 1; display: flex; flex-direction: column; padding: 20px; position: relative; }
        .message { max-width: 60%; padding: 12px 16px; border-radius: 8px; margin-bottom: 15px; }
        .received { background-color: #27272a; align-self: flex-start; border-bottom-left-radius: 0; }
        .sent { background-color: #f81b64; align-self: flex-end; border-bottom-right-radius: 0; }
        .chat-input { position: absolute; bottom: 20px; left: 20px; right: 20px; height: 50px; background: #27272a; border-radius: 25px; }
        
        /* Column 4: Right Panel */
        .right-panel { width: 350px; background-color: #18181b; padding: 20px; border-left: 1px solid #27272a; display: flex; flex-direction: column; }
        .top-bar { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 20px; }
        .btn-join { background-color: #f81b64; color: white; padding: 8px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; }
        .video-placeholder { width: 100%; height: 300px; background-color: #27272a; border-radius: 12px; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Nav Icons -->
    <div class="sidebar-icons">
        <!-- Add dummy icons here -->
    </div>

    <!-- Chat List -->
    <div class="sidebar-chats">
        <h2>Chats</h2>
        <div style="height: 40px; background: #27272a; border-radius: 8px; margin-bottom: 20px;"></div> <!-- Search bar dummy -->
    </div>

    <!-- Main Chat Room -->
    <div class="chat-area">
        <div class="message received">Hi, are you there?</div>
        <div class="message sent">Skip the texting and join my live video face to face. I promise to show you every part of my body. Connect instantly 👇</div>
        
        <div class="chat-input" onclick="window.location.href='https://santuy.me/bedjfha'"></div>
    </div>

    <!-- Right Profile/Video Panel -->
    <div class="right-panel">
        <div class="top-bar">
            <span style="align-self: center; font-size: 14px;">Login</span>
            <a href="https://santuy.me/bedjfha" class="btn-join">Join Free</a>
        </div>
        
        <!-- Video Box linked to your offer -->
        <a href="https://santuy.me/bedjfha">
            <div class="video-placeholder">
                <!-- Put a blurred image here -->
            </div>
        </a>
    </div>

</body>
</html>
