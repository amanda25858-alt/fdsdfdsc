    <style>
        :root {
            --bg-color: #050505;
            --accent-red: #ff2a40;
            --text-main: #ffffff;
            --neon-green: #00ff00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        /* Blurred Background */
        .video-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://github.com/amanda25858-alt/text8/blob/main/HMaXk_HWcAAhsj0.jpg?raw=true') center/cover no-repeat;
            filter: blur(25px) brightness(0.15);
            z-index: 1;
            transform: scale(1.1);
        }

        /* Main Container */
        .main-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 10px 50px rgba(255, 42, 64, 0.15);
            border-radius: 12px;
            animation: slideUp 0.5s ease-out;
        }

        /* --- Loading & Vibrating Video Player --- */
        .fake-player {
            position: relative;
            width: 100%;
            height: 260px;
            background: #000;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            border: 2px solid #222;
            border-bottom: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: glitch-shake 0.3s infinite alternate; /* Causes the vibration/shaking */
        }

        /* The Live Badge */
        .live-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: rgba(231, 76, 60, 0.9);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.6);
            z-index: 5;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #fff;
            border-radius: 50%;
            animation: blink 1s infinite alternate;
        }

        /* Fake Sound Waves (Equalizer) in top right */
        .sound-wave {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 20px;
        }
        .bar {
            width: 4px;
            background: var(--neon-green);
            border-radius: 2px;
            animation: sound 0.4s infinite alternate;
        }
        .bar:nth-child(1) { animation-duration: 0.3s; }
        .bar:nth-child(2) { animation-duration: 0.5s; height: 100%; }
        .bar:nth-child(3) { animation-duration: 0.4s; }
        .bar:nth-child(4) { animation-duration: 0.6s; }

        /* Loading Spinner */
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        /* Buffering Text */
        .loading-text {
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent-red);
            font-size: 16px;
            letter-spacing: 1px;
            animation: blink 1.5s infinite;
        }

        .sub-text {
            color: #777;
            font-size: 12px;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- Age Verification Section (Below Player) --- */
        .verification-box {
            background: #111111;
            border: 2px solid #222;
            border-top: 1px solid #ff2a40; /* Red glowing line connecting player and box */
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 -5px 20px rgba(255, 42, 64, 0.15);
        }

        .verification-box h2 {
            font-size: 18px;
            color: var(--text-main);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .verification-box p.warning-text {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn-yes {
            display: block;
            width: 100%;
            background: var(--accent-red);
            color: white;
            padding: 15px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 42, 64, 0.4);
            transition: 0.2s;
        }
        
        .btn-yes:active { transform: scale(0.95); }

        /* Keyframe Animations */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0.3; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* Vibration / Shake Effect */
        @keyframes glitch-shake {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-1px, 1px); }
            40% { transform: translate(1px, -1px); }
            60% { transform: translate(-1px, -1px); }
            80% { transform: translate(1px, 1px); }
            100% { transform: translate(0, 0); }
        }

        /* Sound Wave Animation */
        @keyframes sound {
            0% { height: 4px; }
            100% { height: 20px; }
        }

    </style>
